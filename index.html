<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gamer Hub</title>

<style>
body {
    background: black;
    color: #0ff;
    font-family: Arial;
    text-align: center;
}
header {
    padding: 20px;
    font-size: 30px;
    text-shadow: 0 0 10px #0ff;
}
button {
    margin: 5px;
    padding: 10px;
    background: #0ff;
    border: none;
    cursor: pointer;
}
button:hover {
    background: red;
}
.card {
    background: #111;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>
<body>

<header>🎮 GAMER HUB</header>

<nav>
<button onclick="showPage('anasayfa')">Ana Sayfa</button>
<button onclick="showPage('oyunlar')">Oyunlar</button>
<button onclick="showPage('hesap')">Hesap</button>
</nav>

<div id="icerik">
<h2>Hoş geldin!</h2>
</div>

<script>
function showPage(sayfa) {
    let icerik = document.getElementById("icerik");

    if (sayfa === "anasayfa") {
        icerik.innerHTML = "<h2>Ana Sayfa</h2><p>Hoş geldin gamer 😎</p>";
    }

    if (sayfa === "oyunlar") {
        icerik.innerHTML = "<h2>Oyunlar</h2><p>Minecraft, CS2, GTA V</p>";
    }

    if (sayfa === "hesap") {
        icerik.innerHTML = `
        <h2>Giriş</h2>
        <input placeholder="Kullanıcı"><br><br>
        <input type="password" placeholder="Şifre"><br><br>
        <button>Giriş Yap</button>
        `;
    }
}
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>PRO PLATFORM</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* LOGIN */
#loginPage {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.loginBox {
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
}

input {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 6px;
}

/* MENU */
#app {
  display: none;
}

nav {
  background: #1e293b;
  padding: 15px;
  display: flex;
  justify-content: space-around;
}

button {
  padding: 10px;
  border: none;
  background: #22c55e;
  cursor: pointer;
  border-radius: 6px;
}

/* SECTIONS */
.section {
  display: none;
  padding: 20px;
}

/* CHAT */
#chatBox {
  height: 300px;
  background: #111827;
  padding: 10px;
  overflow-y: auto;
  border-radius: 10px;
}

/* GAME */
.square {
  width: 80px;
  height: 80px;
  background: red;
  position: relative;
  animation: move 2s infinite alternate;
}

@keyframes move {
  from {left: 0;}
  to {left: 200px;}
}

/* PROFILE */
.profileCard {
  background: #111827;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="loginBox">
    <h2>Giriş Yap</h2>
    <input id="user" placeholder="Kullanıcı adı"><br>
    <button onclick="login()">Giriş</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<nav>
  <button onclick="show('home')">Ana Sayfa</button>
  <button onclick="show('chat')">Chat</button>
  <button onclick="show('game')">Oyun</button>
  <button onclick="show('profile')">Profil</button>
</nav>

<!-- HOME -->
<div id="home" class="section">
  <h1>Hoşgeldin 👋</h1>
  <p>Bu bir PRO mini platform</p>
</div>

<!-- CHAT -->
<div id="chat" class="section">
  <div id="chatBox"></div>
  <input id="msg" placeholder="Mesaj yaz">
  <button onclick="send()">Gönder</button>
</div>

<!-- GAME -->
<div id="game" class="section">
  <h2>Mini Oyun</h2>
  <div class="square"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <div class="profileCard">
    <h2 id="name"></h2>
    <p>Seviye: 1</p>
  </div>
</div>

</div>

<script>

let username = "";

function login() {
  username = document.getElementById("user").value;
  if(username == "") return;

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("name").innerText = username;
  show("home");
}

function show(id) {
  let sections = document.querySelectorAll(".section");
  sections.forEach(s => s.style.display = "none");
  document.getElementById(id).style.display = "block";
}

function send() {
  let msg = document.getElementById("msg").value;
  if(msg == "") return;

  let box = document.getElementById("chatBox");
  box.innerHTML += "<div><b>" + username + ":</b> " + msg + "</div>";

  document.getElementById("msg").value = "";
}

</script>

</body>
</html>
